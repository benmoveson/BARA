name: bara
description: BARA - Shop management app for small business owners
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  uuid: ^4.4.2
  intl: ^0.19.0
  http: ^1.2.2
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.2
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.3
  
  # Image handling
  image_picker: ^1.1.2
  
  # Navigation
  go_router: ^14.6.1
  
  # UI
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true